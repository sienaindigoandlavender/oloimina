<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>oloimina</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <nav class="sidebar" aria-label="navigation">
        <div class="ws">oloimina</div>

        <ul class="nav" data-group="views">
          <li>
            <button class="nav-item" data-view="today" aria-current="page">today</button>
          </li>
          <li>
            <button class="nav-item" data-view="backlog">backlog</button>
          </li>
        </ul>
      </nav>

      <main class="main">
        <header class="topbar">
          <div class="topbar-l">
            <div class="date" id="date"></div>
            <div class="phase" id="phase"></div>
          </div>
        </header>

        <section class="view view-today" id="view-today">
          <div class="day-grid">
            <article class="day" data-offset="0"></article>
            <article class="day" data-offset="1"></article>
            <article class="day" data-offset="2"></article>
          </div>
        </section>

        <section class="view view-backlog" id="view-backlog" hidden>
          <header class="view-head">
            <h1>backlog</h1>
            <span class="view-sub">things you'll get to.</span>
          </header>
          <form class="add" id="backlog-add" autocomplete="off">
            <input
              type="text"
              id="backlog-add-input"
              placeholder="add a task"
              aria-label="add a task"
            />
            <input
              type="text"
              id="backlog-add-mins"
              inputmode="numeric"
              placeholder="min"
              aria-label="estimated minutes"
            />
          </form>
          <ol class="backlog-list" id="backlog-list" data-zone="backlog"></ol>
          <p class="empty" id="backlog-empty" hidden>
            nothing's loose. write one above when something comes up.
          </p>
        </section>
      </main>

      <aside class="cal" aria-label="calendar timeline">
        <header class="cal-head">
          <span class="cal-label">calendar</span>
          <span class="cal-day" id="cal-day"></span>
        </header>
        <div class="cal-scroll">
          <div class="cal-grid" id="cal-grid" data-zone="calendar"></div>
        </div>
      </aside>
    </div>

    <template id="day-tpl">
      <header class="day-head">
        <div>
          <h2 class="day-name"></h2>
          <span class="day-date"></span>
        </div>
        <span class="day-total"></span>
      </header>
      <form class="day-add" autocomplete="off">
        <input type="text" class="day-add-input" placeholder="+ add task" />
        <input
          type="text"
          class="day-add-mins"
          inputmode="numeric"
          placeholder="min"
          aria-label="minutes"
        />
      </form>
      <ol class="day-list"></ol>
    </template>

    <template id="task-tpl">
      <li class="task" draggable="true">
        <div class="task-top">
          <span
            class="task-time"
            contenteditable="true"
            spellcheck="false"
            data-empty="set time"
          ></span>
          <span
            class="task-mins"
            contenteditable="true"
            spellcheck="false"
            data-empty="—"
          ></span>
        </div>
        <div
          class="task-title"
          contenteditable="true"
          spellcheck="false"
        ></div>
        <div class="task-bot">
          <button class="check" type="button" aria-label="mark done"></button>
          <span
            class="task-tag"
            contenteditable="true"
            spellcheck="false"
            data-empty="# tag"
          ></span>
        </div>
      </li>
    </template>

    <template id="cal-block-tpl">
      <div class="cal-block" draggable="true">
        <span class="cal-block-time"></span>
        <span class="cal-block-title"></span>
      </div>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
